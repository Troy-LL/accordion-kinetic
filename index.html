<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Accordion Kinetic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

  <!-- PLAY UI — hidden until after init -->
  <main class="play-ui" id="play-ui" style="display:none;">

    <!-- Keys area with bellows-style background -->
    <div id="keys-container">

      <!-- Octave 1 sharps -->
      <div class="row row-sharps" id="sharps-1">
        <div class="key-slot">
          <button class="key key-black" data-note="C#4">C#</button>
        </div>
        <div class="key-slot">
          <button class="key key-black" data-note="D#4">D#</button>
        </div>
        <div class="key-slot spacer"></div>
        <div class="key-slot">
          <button class="key key-black" data-note="F#4">F#</button>
        </div>
        <div class="key-slot">
          <button class="key key-black" data-note="G#4">G#</button>
        </div>
        <div class="key-slot">
          <button class="key key-black" data-note="A#4">A#</button>
        </div>
        <div class="key-slot spacer"></div>
        <!-- Octave 2 sharps inline -->
        <div class="key-slot">
          <button class="key key-black" data-note="C#5">C#</button>
        </div>
        <div class="key-slot">
          <button class="key key-black" data-note="D#5">D#</button>
        </div>
        <div class="key-slot spacer"></div>
        <div class="key-slot">
          <button class="key key-black" data-note="F#5">F#</button>
        </div>
        <div class="key-slot">
          <button class="key key-black" data-note="G#5">G#</button>
        </div>
        <div class="key-slot">
          <button class="key key-black" data-note="A#5">A#</button>
        </div>
        <div class="key-slot spacer"></div>
      </div>

      <!-- All whites: C4 through C6 = 15 notes -->
      <div class="row row-whites">
        <button class="key key-white" data-note="C4">C</button>
        <button class="key key-white" data-note="D4">D</button>
        <button class="key key-white" data-note="E4">E</button>
        <button class="key key-white" data-note="F4">F</button>
        <button class="key key-white" data-note="G4">G</button>
        <button class="key key-white" data-note="A4">A</button>
        <button class="key key-white" data-note="B4">B</button>
        <button class="key key-white" data-note="C5">C</button>
        <button class="key key-white" data-note="D5">D</button>
        <button class="key key-white" data-note="E5">E</button>
        <button class="key key-white" data-note="F5">F</button>
        <button class="key key-white" data-note="G5">G</button>
        <button class="key key-white" data-note="A5">A</button>
        <button class="key key-white" data-note="B5">B</button>
        <button class="key key-white" data-note="C6">C</button>
      </div>

    </div>

    <!-- Recalibrate: only shows when no notes playing -->
    <button id="recalibrate-btn">↺ Recalibrate</button>

  </main>

  <!-- INIT SCREEN — full screen, disappears after tap -->
  <div id="permission-screen">
    <div class="overlay-content">
      <p class="init-instruction">Hold phone landscape,<br>parallel to the floor,<br>screen facing up.</p>
      <div id="stability-ring">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#333" stroke-width="6"/>
          <circle id="stability-arc" cx="50" cy="50" r="42" fill="none"
            stroke="#e74c3c" stroke-width="6"
            stroke-dasharray="0 264"
            stroke-linecap="round"
            transform="rotate(-90 50 50)"/>
        </svg>
        <span id="stability-label">HOLD STILL</span>
      </div>
      <button id="start-btn">TAP TO BEGIN</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
